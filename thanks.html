<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hypr</title>

<style>

body{
  margin:0;
  background:#0B0B0B;
  font-family:Helvetica, Arial, sans-serif;
  color:#FFF;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px;
  box-sizing:border-box;
}

.logo{
  width:180px;
  max-width:60vw;
  margin-bottom:28px;
}

.message{
  font-size:22px;
  margin-bottom:12px;
}

.sub{
  font-size:15px;
  color:#CFCFCF;
  margin-bottom:22px;
}

.social{
  font-size:14px;
}

.social a{
  color:#FFFFFF;
  text-decoration:none;
  border-bottom:1px solid #444;
  padding-bottom:2px;
}

.social a:hover{
  border-color:#888;
}

</style>
</head>

<body>

<div class="container">

<a href="https://instagram.com/gethypr_" target="_blank">
  <img src="/hypr-logo-white.png" class="logo">
</a>

<p class="message">
You're on the list.
</p>

<p class="sub">
We'll notify you when Hypr launches and username selection opens.
</p>

<p class="social">
Follow Hypr on  
<a href="https://instagram.com/gethypr_" target="_blank">Instagram</a>
</p>

</div>

</body>
</html>
