<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hypr</title>

<style>

body {
  margin:0;
  background:#0B0B0B;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

video {
  width:90vw;
  max-width:1800px;
  height:auto;
}

@media (max-width:768px) {

  body{
    align-items:flex-start;
    padding-top:38vh;
  }

  video{
    width:95vw;
  }

}
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.signup{
  margin-top:32px;
  text-align:center;
}

.artists{
  font-family:Helvetica, Arial, sans-serif;
  font-size:14px;
  color:#888;
  margin-bottom:6px;
}

.claim{
  font-family:Helvetica, Arial, sans-serif;
  font-size:16px;
  color:#F5F5F5;
  margin-bottom:12px;
}

input{
  background:#111;
  border:1px solid #333;
  color:#F5F5F5;
  padding:12px 16px;
  width:220px;
  font-size:14px;
}

input:focus{
  border-color:#555;
  outline:none;
}
</style>
</head>

<body>

<div class="container">

<video autoplay muted loop playsinline preload="metadata">
  <source src="./hypr-loop.mp4" type="video/mp4">
</video>

<div class="signup">

<p class="artists">
for artists and cultural explorers
</p>

<p class="claim">
claim your username
</p>

<input type="email" placeholder="email address">

</div>

</div>

</body>
</html>
