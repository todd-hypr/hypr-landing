<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hypr</title>

<style>
body{
  margin:0;
  background:#0B0B0B;
  font-family:Helvetica, Arial, sans-serif;
  color:#FFF;
}

p{ margin:0; }

video{
  width:90vw;
  max-width:1400px;
  max-height:60vh;
  display:block;
  -webkit-mask-image: radial-gradient(circle at center, black 65%, transparent 100%);
  mask-image: radial-gradient(circle at center, black 65%, transparent 100%);
}

.container{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:40px 20px;
}

.signup{
  margin-top:3vh;
  text-align:center;
}

.intro, .cta, .note{
  font-size:15px;
  color:#CFCFCF;
}

.headline{
  font-size:22px;
  color:#FFF;
  margin:14px 0;
}

input{
  background:#0F0F0F;
  border:1px solid #555;
  color:#FFF;
  padding:14px;
  width:320px;
  border-radius:6px;
  margin:14px 0;
}

button{
  background:#FFF;
  color:#000;
  border:none;
  padding:12px 20px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<video autoplay muted loop playsinline>
  <source src="./hypr-loop.mp4" type="video/mp4">
</video>

<div class="signup" id="waitlist-form">

<p class="intro">Artists + the art curious</p>

<p class="headline">Discover what actually resonates</p>

<p class="cta">
Join the waitlist<br>
Claim your username when Hypr launches
</p>

<input type="email" id="email" placeholder="Enter your email" required>

<button id="join-btn">Join</button>

<p class="note">Early access begins with independent artists</p>

</div>

</div>

<script>
document.getElementById("join-btn").addEventListener("click", async () => {

  const email = document.getElementById("email").value;

  console.log("CLICK WORKS");

  try {
    const res = await fetch("/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    console.log("STATUS:", res.status);

  if (res.ok) {
  setTimeout(() => {
  window.location.href = "/thanks";
}, 1500);
} else {
  console.error("FAILED:", res.status);
  alert("Signup failed. Check console.");
}

  } catch (err) {
    console.error(err);
  }

});
</script>

</body>
</html>
