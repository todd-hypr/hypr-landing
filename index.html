<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hypr</title>

<style>

body{
  margin:0;
  background:#0B0B0B;
  font-family:Helvetica, Arial, sans-serif;
  color:#FFF;
}

/* Page layout */

.container{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  padding:6vh 20px 8vh 20px;
  box-sizing:border-box;
}

/* Video */

video{
  width:90vw;
  max-width:1800px;
  height:auto;
  display:block;
}

/* Signup section */

.signup{
  margin-top:4vh;
  text-align:center;
}

.artists{
  font-size:14px;
  color:#888;
  margin-bottom:6px;
}

.claim{
  font-size:16px;
  color:#F5F5F5;
  margin-bottom:12px;
}

/* Input */

input{
  background:#0F0F0F;
  border:1px solid #2A2A2A;
  color:#FFFFFF;
  padding:14px 18px;
  width:240px;
  font-size:14px;
  border-radius:6px;
}

input:focus{
  border-color:#555;
  outline:none;
}

/* Mobile adjustments */

@media (max-width:768px){

  .container{
    padding-top:12vh;
  }

  video{
    width:95vw;
  }

  .signup{
    margin-top:5vh;
  }

}

</style>
</head>

<body>

<div class="container">

<video autoplay muted loop playsinline preload="metadata">
  <source src="./hypr-loop.mp4" type="video/mp4">
</video>

<div class="signup">

<p class="artists">
for artists and cultural explorers
</p>

<p class="claim">
claim your username
</p>

<input type="email" placeholder="email address">

</div>

</div>

</body>
</html>
