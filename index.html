<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hypr</title>

<style>
body{
  margin:0;
  background:#0B0B0B;
  font-family:Helvetica, Arial, sans-serif;
  color:#FFF;
}

p{ margin:0; }

video{
  width:90vw;
  max-width:1400px;
  max-height:60vh;
  display:block;
  -webkit-mask-image: radial-gradient(circle at center, black 65%, transparent 100%);
  mask-image: radial-gradient(circle at center, black 65%, transparent 100%);
}

.container{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:40px 20px;
}

.signup{
  margin-top:3vh;
  text-align:center;
}

.intro, .note{
  font-size:15px;
  color:#CFCFCF;
  margin:14px 0;
}
.cta{
  font-size:15px;
  color:#CFCFCF;
  margin:8px 0 6px 0;
}
.anchor{
  font-size:13px;
  color:#888;
  margin-top:14px;
}

.headline{
  font-size:22px;
  color:#FFF;
  margin:14px 0;
}

input{
  background:#0F0F0F;
  border:1px solid #555;
  color:#FFF;
  padding:14px;
  width:min(320px, 90vw);
  border-radius:6px;
  margin:14px 0;
}

button{
  background:#FFF;
  color:#000;
  border:none;
  padding:12px 20px;
  border-radius:6px;
  cursor:pointer;
}
@media (min-width: 768px) and (orientation: landscape) {
  video {
    max-height: 60vh;
  }
  .container {
    padding: 6px 20px;
  }
  .signup {
    margin-top: 0.5vh;
  }
  .headline {
    margin: 8px 0;
  }
  .intro {
    margin: 8px 0;
  }
  .cta {
    margin: 6px 0 4px 0;
  }
  .anchor {
    margin-top: 8px;
  }
}
  
</style>
</head>

<body>

<div class="container">

<video autoplay muted loop playsinline>
  <source src="./hypr-loop.mp4" type="video/mp4">
</video>

<div class="signup" id="waitlist-form">

<p class="headline">Most people cannot describe the art they love. They know it the moment they see it.</p>
<p class="intro">Introducing hyper-individualized discovery.</p>
<p class="intro" style="margin-top:5px;">For independent artists and the people who love what they make.</p>
<p class="cta">Join the waitlist.</p>
<input type="email" id="email" placeholder="Enter your email" required>
<button id="join-btn">Join</button>
<p class="anchor">Claim your username when Hypr launches.</p>

</div>

</div>

<script>
document.getElementById("join-btn").addEventListener("click", async () => {

  const email = document.getElementById("email").value;
  const button = document.getElementById("join-btn");

  // 🔒 Prevent double clicks
  button.disabled = true;
  button.innerText = "Getting you in...";

  console.log("CLICK WORKS");

  try {
    const res = await fetch("/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    console.log("STATUS:", res.status);

    if (res.ok) {
      button.innerText = "You're in";

      setTimeout(() => {
        window.location.href = "/thanks";
      }, 1200);

    } else {
      button.disabled = false;
      button.innerText = "Join";
      alert("Signup failed. Try again.");
    }

  } catch (err) {
    console.error(err);
    button.disabled = false;
    button.innerText = "Join";
  }

});
</script>

</body>
</html>
