<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hypr</title>

<style>

body{
  margin:0;
  background:#0B0B0B;
  font-family:Helvetica, Arial, sans-serif;
  color:#FFF;
}

p{
  margin:0;
}
  
video{
  width:90vw;
  max-width:1400px;
  max-height:60vh;
  height:auto;
  display:block;
  -webkit-mask-image: radial-gradient(circle at center, black 65%, transparent 100%);
  mask-image: radial-gradient(circle at center, black 65%, transparent 100%);
}
  
/* Page layout */

.container{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:40px 20px;
  box-sizing:border-box;
  max-width:1600px;
  margin:auto;
}

/* Signup section */

.signup{
  margin-top:5vh;
  text-align:center;
}

.intro{
  font-size:14px;
  color:#AAAAAA;
  margin-bottom:10px;
}

.headline{
  font-size:20px;
  color:#FFFFFF;
  font-weight:500;
  margin-bottom:16px;
}

.cta{
  font-size:16px;
  color:#EAEAEA;
  margin-bottom:18px;
}

.note{
  font-size:13px;
  color:#888;
  margin-top:12px;
}

/* Input */

input{
  background:#0F0F0F;
  border:1px solid #2A2A2A;
  color:#FFFFFF;
  padding:14px 18px;
  width:260px;
  font-size:14px;
  border-radius:6px;
}

input:focus{
  border-color:#666;
  outline:none;
  box-shadow:0 0 0 1px #444;
}

/* Mobile adjustments */

@media (max-width:768px){

  .container{
    padding-top:12vh;
  }

  video{
    width:95vw;
  }

  .signup{
    margin-top:5vh;
  }

}

</style>
</head>

<body>

<div class="container">

<video autoplay muted loop playsinline preload="metadata">
  <source src="./hypr-loop.mp4" type="video/mp4">
</video>

<form class="signup" method="POST">

<p class="intro">
For visual artists and cultural explorers
</p>

<p class="headline">
Discover artists near you
</p>

<p class="cta">
Join the waitlist<br>
Claim your username when Hypr launches
</p>

<input type="email" name="email" placeholder="Enter your email" required>

<p class="note">
Early access begins with independent artists
</p>

</form>

</div>

</body>
</html>
